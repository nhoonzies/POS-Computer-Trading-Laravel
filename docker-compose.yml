version: '3.8'

services:
  rigmanager:
    build:
      context: .
      dockerfile: Dockerfile
    image: rigmanager:latest
    ports:
      - "8000:80"
    volumes:
      - ./rigmanager/.env:/var/www/.env
      - rigmanager-db:/var/www/database
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    restart: unless-stopped

volumes:
  rigmanager-db: